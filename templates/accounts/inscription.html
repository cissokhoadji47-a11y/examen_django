{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> Inscription</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="username" class="form-label">Nom d'utilisateur *</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Mot de passe *</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>

                    <div class="mb-3">
                        <label for="password2" class="form-label">Confirmer le mot de passe *</label>
                        <input type="password" class="form-control" id="password2" name="password2" required>
                    </div>

                    <div class="mb-3">
                        <label for="role" class="form-label">Vous êtes *</label>
                        <select class="form-control" id="role" name="role" required>
                            <option value="etudiant">Étudiant</option>
                            <option value="professeur">Professeur</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> S'inscrire
                        </button>
                    </div>
                </form>

                <hr>

                <p class="text-center mb-0">
                    Déjà inscrit ?
                    <a href="{% url 'login' %}">Connectez-vous</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
