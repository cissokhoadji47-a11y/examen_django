{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="bi bi-pencil"></i> Modifier la tâche</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="titre" class="form-label">Titre de la tâche *</label>
                        <input type="text" class="form-control" id="titre" name="titre" value="{{ tache.titre }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3">{{ tache.description }}</textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="assigne_a" class="form-label">Assigner à</label>
                            <select class="form-control" id="assigne_a" name="assigne_a">
                                <option value="">-- Non assigné --</option>
                                {% for membre in membres %}
                                    <option value="{{ membre.id }}" {% if tache.assigne_a.id == membre.id %}selected{% endif %}>
                                        {{ membre.username }} ({{ membre.get_role_display }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="date_limite" class="form-label">Date limite *</label>
                            <input type="date" class="form-control" id="date_limite" name="date_limite" 
                                   value="{{ tache.date_limite|date:'Y-m-d' }}" required>
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'detail_projet' tache.projet.id %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour
                        </a>
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-save"></i> Enregistrer
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
