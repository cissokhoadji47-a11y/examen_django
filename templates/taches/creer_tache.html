{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-plus-circle"></i> Ajouter une tâche au projet "{{ projet.titre }}"</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="titre" class="form-label">Titre de la tâche *</label>
                        <input type="text" class="form-control" id="titre" name="titre" required 
                               placeholder="Ex: Rédiger le rapport, Corriger les copies...">
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" 
                                  placeholder="Décrivez les détails de la tâche..."></textarea>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="assigne_a" class="form-label">Assigner à</label>
                            <select class="form-control" id="assigne_a" name="assigne_a">
                                <option value="">-- Non assigné --</option>
                                {% for membre in membres %}
                                    <option value="{{ membre.id }}">
                                        {{ membre.username }} ({{ membre.get_role_display }})
                                    </option>
                                {% endfor %}
                            </select>
                            <small class="text-muted">Laissez vide pour ne pas assigner</small>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="date_limite" class="form-label">Date limite *</label>
                            <input type="date" class="form-control" id="date_limite" name="date_limite" required
                                   value="{{ today|date:'Y-m-d' }}">
                            <small class="text-muted">Date avant laquelle la tâche doit être terminée</small>
                        </div>
                    </div>
                    
                    <hr>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'detail_projet' projet.id %}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Retour au projet
                        </a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Créer la tâche
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
